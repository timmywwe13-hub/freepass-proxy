<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FreePass Proxy</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
      --accent: #00f5a0; --accent2: #00d9f5; --text: #e8e8f0; --muted: #6b6b80;
    }
    body {
      background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,245,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,160,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    .container { position: relative; z-index: 1; width: 100%; max-width: 640px; animation: fadeUp 0.6s ease both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px);} to { opacity:1; transform:translateY(0);} }
    header { text-align: center; margin-bottom: 2.5rem; }
    .badge {
      display: inline-block; font-family: 'DM Mono', monospace; font-size: 0.68rem;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent);
      border: 1px solid rgba(0,245,160,0.3); padding: 0.25rem 0.75rem;
      border-radius: 999px; margin-bottom: 1rem; background: rgba(0,245,160,0.05);
    }
    .dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--accent); margin-right:0.4rem; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    h1 {
      font-size: clamp(2.5rem,6vw,4rem); font-weight: 800;
      background: linear-gradient(135deg,#fff 30%,var(--accent) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      margin-bottom: 0.6rem; letter-spacing: -0.02em;
    }
    .subtitle { color: var(--muted); font-size: 0.95rem; line-height: 1.6; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 2rem; position: relative; overflow: hidden;
    }
    .card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,var(--accent),transparent); opacity:0.5;
    }
    label {
      font-family:'DM Mono',monospace; font-size:0.7rem; letter-spacing:0.12em;
      text-transform:uppercase; color:var(--muted); display:block; margin-bottom:0.6rem;
    }
    .input-row { display:flex; gap:0.6rem; }
    input[type="text"] {
      flex:1; background:var(--bg); border:1px solid var(--border); border-radius:12px;
      color:var(--text); font-family:'DM Mono',monospace; font-size:0.9rem;
      padding:0.8rem 1rem; outline:none; transition:border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,245,160,0.1); }
    input::placeholder { color:var(--muted); }
    button {
      background:var(--accent); color:#0a0a0f; border:none; border-radius:12px;
      font-family:'Syne',sans-serif; font-weight:700; font-size:0.9rem;
      padding:0.8rem 1.4rem; cursor:pointer; transition:transform 0.15s, box-shadow 0.15s; white-space:nowrap;
    }
    button:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,245,160,0.3); }
    .quick-links { margin-top:1.2rem; display:flex; flex-wrap:wrap; gap:0.5rem; }
    .ql-label {
      font-family:'DM Mono',monospace; font-size:0.65rem; letter-spacing:0.1em;
      text-transform:uppercase; color:var(--muted); width:100%; margin-bottom:0.1rem;
    }
    .quick-chip {
      background:var(--bg); border:1px solid var(--border); border-radius:8px;
      color:var(--text); font-family:'DM Mono',monospace; font-size:0.75rem;
      padding:0.35rem 0.75rem; cursor:pointer; text-decoration:none;
      transition:border-color 0.2s, color 0.2s;
    }
    .quick-chip:hover { border-color:var(--accent); color:var(--accent); }
    footer {
      text-align:center; margin-top:1.5rem; color:var(--muted);
      font-family:'DM Mono',monospace; font-size:0.65rem; line-height:1.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="badge"><span class="dot"></span>Online · Works on Any Device</div>
      <h1>FreePass</h1>
      <p class="subtitle">Type any blocked URL below and browse freely.<br>Works on Chromebook, phone, tablet — anything.</p>
    </header>
    <div class="card">
      <label for="urlInput">🔗 Enter any URL to unblock</label>
      <div class="input-row">
        <input type="text" id="urlInput" placeholder="https://youtube.com" autocomplete="off" spellcheck="false"/>
        <button onclick="go()">Go →</button>
      </div>
      <div class="quick-links">
        <span class="ql-label">Quick links</span>
        <a class="quick-chip" href="#" onclick="visit('https://youtube.com');return false;">YouTube</a>
        <a class="quick-chip" href="#" onclick="visit('https://twitter.com');return false;">Twitter / X</a>
        <a class="quick-chip" href="#" onclick="visit('https://reddit.com');return false;">Reddit</a>
        <a class="quick-chip" href="#" onclick="visit('https://instagram.com');return false;">Instagram</a>
        <a class="quick-chip" href="#" onclick="visit('https://twitch.tv');return false;">Twitch</a>
        <a class="quick-chip" href="#" onclick="visit('https://discord.com');return false;">Discord</a>
        <a class="quick-chip" href="#" onclick="visit('https://google.com');return false;">Google</a>
        <a class="quick-chip" href="#" onclick="visit('https://github.com');return false;">GitHub</a>
      </div>
    </div>
    <footer>Traffic is proxied through the server — use responsibly.</footer>
  </div>
  <script>
    function normalize(u) {
      u = u.trim();
      if (!u.startsWith('http://') && !u.startsWith('https://')) u = 'https://' + u;
      return u;
    }
    function go() {
      const raw = document.getElementById('urlInput').value;
      if (!raw) return;
      window.location.href = '/proxy?url=' + encodeURIComponent(normalize(raw));
    }
    function visit(u) { window.location.href = '/proxy?url=' + encodeURIComponent(u); }
    document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
  </script>
</body>
</html>
